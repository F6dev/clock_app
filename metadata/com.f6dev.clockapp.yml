Categories:
  - Utilities

License: MIT

AuthorName: F6dev

WebSite: https://github.com/F6dev/clock_app
SourceCode: https://github.com/F6dev/clock_app
IssueTracker: https://github.com/F6dev/clock_app/issues

AutoName: Clock App

Summary: シンプルな置き時計アプリ

Description: |
  フォント変更やスリープ防止機能を持つシンプルな時計アプリ。

RepoType: git
Repo: https://github.com/F6dev/clock_app

Builds:
  - versionName: 1.1.0
    versionCode: 1
    commit: v1.1
    subdir: .
    sudo:
      - apt-get update
      - apt-get install -y curl git unzip xz-utils zip libglu1-mesa
    init:
      - curl -LO https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.19.0-stable.tar.xz
      - tar xf flutter_linux_3.19.0-stable.tar.xz
      - export PATH="$PWD/flutter/bin:$PATH"
      - flutter doctor
    build:
      - flutter pub get
      - flutter build apk --release
    output: build/app/outputs/flutter-apk/app-release.apk